<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satoru's Special Order ♡</title>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Poppins:wght@300;500;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff99ac; --accent: #ff4d6d; --bg: #0a0a0a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; background: var(--bg); color: white; overflow: hidden; font-family: 'Poppins', sans-serif; }

        #puzzle-screen {
            position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 20; transition: all 0.8s ease; padding: 15px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        .header { text-align: center; margin-bottom: 25px; }
        .puzzle-title { font-family: 'Parisienne'; font-size: 2.4rem; color: var(--primary); margin-bottom: 8px; }
        .puzzle-hint { font-family: 'Caveat'; color: #aaa; font-size: 1.3rem; text-align: center; max-width: 280px; }

        #word-slots { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 35px; width: 100%; }
        .slot {
            width: clamp(24px, 7vw, 30px); height: 40px; border-bottom: 2px solid rgba(255,153,172,0.2);
            display: flex; align-items: center; justify-content: center; font-size: clamp(1.2rem, 5vw, 1.5rem); color: var(--primary); transition: 0.3s;
        }
        .slot.filled { border-color: var(--primary); border-bottom-width: 3px; transform: translateY(-3px); }
        .slot.space { border: none; width: 10px; }

        #letters-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%; max-width: 350px; }
        .letter-btn {
            width: clamp(42px, 12vw, 48px); height: clamp(42px, 12vw, 48px); background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem;
        }
        .letter-btn.used { opacity: 0; pointer-events: none; transform: scale(0.5); }

        #scratch-screen { position: absolute; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; z-index: 10; padding: 10px; }
        #scratch-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; transition: opacity 1.5s; }
        #secret-content { text-align: center; width: 95%; max-width: 360px; z-index: 1; display: flex; flex-direction: column; align-items: center; }
        .char-img { width: 100%; max-height: 50vh; object-fit: cover; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 15px; }
        
        .gojo-bubble { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; 
            border-left: 4px solid var(--primary); text-align: left; width: 100%;
        }
        .gojo-msg { font-family: 'Caveat'; font-size: 1.4rem; color: #f0f0f0; line-height: 1.3; margin: 0; }
        .venom-highlight { color: var(--primary); font-weight: bold; }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <div id="puzzle-screen">
        <div class="header">
            <h1 class="puzzle-title">Decode the Bond</h1>
            <p class="puzzle-hint">"Two names, one destiny. The perfect match... ♡"</p>
        </div>
        <div id="word-slots"></div>
        <div id="letters-pool"></div>
        <button onclick="resetPuzzle()" style="margin-top:30px; background:none; border:none; color:#444; font-size:0.8rem; text-decoration:underline;">Reset</button>
    </div>

    <div id="scratch-screen">
        <canvas id="scratch-canvas"></canvas>
        <div id="secret-content">
            <img class="char-img" src="https://i.ibb.co/ZzGpzZMZ/dc6d0873a8be68f6f98c7214b6749039.jpg" alt="Reward">
            <div class="gojo-bubble">
                <p class="gojo-msg">
                    "Hey Injy! Satoru here. Seeing how you treat <span class="venom-highlight">my boy Venom</span> makes even the strongest sorcerer smile. You're the only one who can make him feel this special. Keep being his world, okay? 😉"
                </p>
                <p style="font-family:'Parisienne'; color:var(--primary); font-size:1.5rem; margin-top:10px; text-align:right;">- Satoru Gojo ♡</p>
            </div>
        </div>
    </div>

    <script>
        const PHRASE = "VENOM X INJY";
        let currentGuess = "";
        const slotsDiv = document.getElementById('word-slots');
        const poolDiv = document.getElementById('letters-pool');

        function init() {
            slotsDiv.innerHTML = "";
            for (let char of PHRASE) {
                const slot = document.createElement('div');
                slot.className = char === " " ? "slot space" : "slot";
                slotsDiv.appendChild(slot);
            }
            const charsOnly = PHRASE.replace(/\s/g, '').split('').sort(() => Math.random() - 0.5);
            poolDiv.innerHTML = "";
            charsOnly.forEach(l => {
                const btn = document.createElement('div');
                btn.className = "letter-btn";
                btn.innerText = l;
                btn.onclick = () => {
                    const cleanTarget = PHRASE.replace(/\s/g, '');
                    if (currentGuess.length < cleanTarget.length) {
                        currentGuess += l;
                        btn.classList.add('used');
                        updateSlots();
                        if (currentGuess.length === cleanTarget.length) check();
                    }
                };
                poolDiv.appendChild(btn);
            });
        }

        function updateSlots() {
            const slots = document.querySelectorAll('.slot:not(.space)');
            slots.forEach((s, i) => {
                s.innerText = currentGuess[i] || "";
                if (currentGuess[i]) s.classList.add('filled');
            });
        }

        function check() {
            if (currentGuess === PHRASE.replace(/\s/g, '')) {
                document.getElementById('puzzle-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('puzzle-screen').style.display = "none";
                    document.getElementById('scratch-screen').style.display = "flex";
                    initScratch();
                }, 800);
            } else {
                slotsDiv.classList.add('shake');
                setTimeout(() => { resetPuzzle(); slotsDiv.classList.remove('shake'); }, 500);
            }
        }

        function resetPuzzle() {
            currentGuess = "";
            updateSlots();
            document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('used'));
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('filled'));
        }

        function initScratch() {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#333'); grad.addColorStop(0.5, '#555'); grad.addColorStop(1, '#222');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let drawing = false;
            const scratch = (e) => {
                if (!drawing) return;
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath(); ctx.arc(x, y, 40, 0, Math.PI * 2); ctx.fill();
                const pix = ctx.getImageData(0,0,canvas.width,canvas.height).data;
                let hits = 0;
                for(let i=3; i<pix.length; i+=128) if(pix[i] === 0) hits++;
                if(hits > (pix.length/128) * 0.6) canvas.style.opacity = '0';
            };

            canvas.addEventListener('mousedown', () => drawing = true);
            canvas.addEventListener('touchstart', () => drawing = true);
            window.addEventListener('mouseup', () => drawing = false);
            window.addEventListener('touchend', () => drawing = false);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('touchmove', e => { e.preventDefault(); scratch(e); });
        }
        init();
    </script>
</body>
</html>
